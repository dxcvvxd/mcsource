name: build
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'
      - run: chmod +x ./gradlew
      - run: ./gradlew genSources
      - run: find ~/.gradle -name "*sources*.jar" -path "*minecraft*" 2>/dev/null | head -1
      - id: find-sources
        run: |
          jar=$(find ~/.gradle -name "*sources*.jar" -path "*minecraft*" 2>/dev/null | head -1)
          echo "jar=$jar" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v7
        with:
          name: Minecraft Sources
          path: ${{ steps.find-sources.outputs.jar }}
